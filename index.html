<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avtobys Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 15px; font-family: 'Inter', sans-serif; background-color: #f4f6fb; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 420px; position: relative; display: none; margin: 0 auto; padding-bottom: 30px;}
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6fb; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .login-card { background: #fff; padding: 40px 30px; border-radius: 28px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .pin-input { width: 100%; padding: 16px; font-size: 26px; font-weight: 800; text-align: center; letter-spacing: 15px; border: 2px solid #edf1f7; border-radius: 18px; margin-bottom: 25px; box-sizing: border-box; outline: none; background: #f9fbfd; transition: 0.3s;}
        .pin-input:focus { border-color: #0055ff; background: #fff;}
        .login-btn { width: 100%; background: #0055ff; color: #fff; border: none; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;}
        
        .logo-card { background-color: #ffffff; border-radius: 24px; padding: 25px; margin-bottom: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); display: flex; justify-content: center; align-items: center; position: relative;}
        .refresh-icon { position: absolute; right: 20px; top: 20px; background: none; border: none; font-size: 18px; cursor: pointer; opacity: 0.5; transition: 0.3s;}
        .refresh-icon:active { transform: rotate(180deg); }
        
        .montazh-title { text-align: center; color: #a0a5b1; font-weight: 800; font-size: 14px; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase;}
        
        .card { background-color: #ffffff; border-radius: 24px; padding: 22px; margin-bottom: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.03); }
        .status-card { display: flex; justify-content: space-between; align-items: flex-start; }
        .status-number-group { display: flex; align-items: baseline; }
        .status-number.orange { font-size: 40px; font-weight: 900; color: #ff7a00; line-height: 1; letter-spacing: -1.5px; }
        .status-percent { font-size: 16px; font-weight: 700; color: #8e94a6; margin-left: 6px; }
        .status-number.blue { font-size: 40px; font-weight: 900; color: #0055ff; line-height: 1; letter-spacing: -1.5px; }
        .status-label { color: #a0a5b1; font-size: 13px; font-weight: 600; margin-top: 6px; }
        
        .section-header { font-size: 20px; font-weight: 800; color: #1a1b22; margin: 25px 0 15px 5px; }
        
        .park-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f2f5; }
        .park-row:last-child { border-bottom: none; }
        .park-name { font-size: 15px; font-weight: 600; color: #1a1b22; max-width: 65%; line-height: 1.3;}
        .park-count-blue { font-size: 15px; font-weight: 800; color: #0055ff; }
        
        .filter-row { display: flex; gap: 12px; margin-bottom: 25px; margin-top: 25px;}
        .filter-btn { flex: 1; background: #fff; border-radius: 20px; padding: 18px 10px; color: #1a1b22; font-size: 14px; font-weight: 700; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.03); cursor: pointer; border: 1px solid #f0f2f5;}
        
        .action-button { width: 100%; background: #1a1b22; color: #fff; border: none; border-radius: 20px; padding: 20px; font-size: 16px; font-weight: 700; cursor: pointer;}
        
        /* Модальные окна */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f6fb; z-index: 1000; display: none; overflow-y: auto; padding-bottom: 20px;}
        .modal.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-container { width: 100%; max-width: 420px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .back-btn { background: #fff; color: #1a1b22; border: none; padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; margin-bottom: 15px; width: 100%; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.03); font-size: 15px;}
        
        .list-item { background: #fff; padding: 20px 22px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); font-weight: 600; font-size: 16px; color: #1a1b22;}
        .list-val-blue { color: #0055ff; font-weight: 800; font-size: 16px;}
        
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 20px; overflow: hidden; font-size: 13px; box-shadow: 0 6px 20px rgba(0,0,0,0.03);}
        th, td { padding: 16px 14px; text-align: left; border-bottom: 1px solid #f0f2f5; }
        th { background: #fafafa; color: #8e94a6; font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px;}
        
        #loading-indicator { display: none; text-align: center; padding: 40px 20px; font-weight: 600; color: #0055ff; font-size: 15px; }
        .error-message { background: #fee; color: #e74c3c; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; font-weight: 600; text-align: center;}
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="https://drive.google.com/uc?export=view&id=1N1ZIf84icjDJEFPY-X2VCKDhDbUWi4Uy" alt="Avtobys" style="width: 140px; margin-bottom: 25px;">
            <input type="password" id="pin-input" class="pin-input" placeholder="••••" inputmode="numeric" maxlength="4">
            <button class="login-btn" onclick="checkPin()">Кіру</button>
            <p id="pin-error" style="color:red; font-size:12px; display:none; margin-top:15px; font-weight: 600;">Қате құпия сөз!</p>
        </div>
    </div>

    <div class="app-container" id="main-view">
        
        <div class="logo-card">
            <img src="https://drive.google.com/uc?export=view&id=1N1ZIf84icjDJEFPY-X2VCKDhDbUWi4Uy" alt="Avtobys" style="height: 40px;">
            <button class="refresh-icon" onclick="loadData()">↻</button>
        </div>
        
        <div class="montazh-title">Монтаж мониторингі</div>

        <div id="loading-indicator">Деректер жүктелуде...</div>

        <div id="dashboard-content" style="display:none;">
            <div id="error-container"></div>
            
            <div class="card status-card">
                <div>
                    <div class="status-number-group">
                        <span class="status-number orange" id="total-count">0</span>
                        <span class="status-percent" id="total-percent">(0%)</span>
                    </div>
                    <div class="status-label">Барлық автобустар</div>
                </div>
                <div style="text-align: right;">
                    <div class="status-number blue" id="latest-count">0</div>
                    <div class="status-label">Бүгін жасалған</div>
                </div>
            </div>

            <div class="section-header">Автопарктер статистикасы</div>
            <div class="card" id="parks-container"></div>

            <div class="filter-row">
                <div class="filter-btn" onclick="openModal('days-modal')">Күнделікті</div>
                <div class="filter-btn" onclick="openModal('routes-modal')">Маршруттар</div>
            </div>
            <button class="action-button" onclick="openModal('table-modal')">Толық тізімді көру</button>
        </div>
    </div>

    <div class="modal" id="days-modal"><div class="modal-container">
        <button class="back-btn" onclick="closeModals()">← Артқа қайту</button>
        <div id="days-content"></div>
    </div></div>
    
    <div class="modal" id="routes-modal"><div class="modal-container">
        <button class="back-btn" onclick="closeModals()">← Артқа қайту</button>
        <div id="routes-content"></div>
    </div></div>
    
    <div class="modal" id="table-modal"><div class="modal-container">
        <button class="back-btn" onclick="closeModals()">← Артқа қайту</button>
        <div style="overflow-x:auto;"><table>
            <thead><tr><th>Парк</th><th>Марш.</th><th>Борт/Гос №</th><th>Модель</th></tr></thead>
            <tbody id="table-content"></tbody>
        </table></div>
    </div></div>

    <script>
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbyIq_TzbUb7E4ebzdj3SSvtSDOHF8EyUu8UkCUdpictaqXPJ82-5Vxchg5fTp18Se1JDg/exec';
        const PIN = '2019';
        
        const monthNames = ["қаңтар", "ақпан", "наурыз", "сәуір", "мамыр", "маусым", "шілде", "тамыз", "қыркүйек", "қазан", "қараша", "желтоқсан"];
        
        function formatKazDate(dateStr) {
            let p = dateStr.split('.'); 
            if(p.length < 2) return dateStr;
            let d = parseInt(p[0], 10);
            let m = parseInt(p[1], 10) - 1;
            return d + ' ' + monthNames[m];
        }

        function checkPin() {
            if(document.getElementById('pin-input').value === PIN) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                loadData();
            } else { 
                document.getElementById('pin-error').style.display = 'block'; 
                document.getElementById('pin-input').value = '';
            }
        }

        document.getElementById('pin-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPin();
        });

        function openModal(id) { document.getElementById('dashboard-content').style.display = 'none'; document.getElementById(id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('dashboard-content').style.display = 'block'; window.scrollTo(0,0); }

        function loadData() {
            document.getElementById('loading-indicator').style.display = 'block';
            document.getElementById('dashboard-content').style.display = 'none';
            document.getElementById('error-container').innerHTML = '';

            fetch(GOOGLE_API_URL)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading-indicator').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';

                    if(data.error) {
                        document.getElementById('error-container').innerHTML = `<div class="error-message">Қате: ${data.error}</div>`;
                        return;
                    }

                    // Сводка
                    document.getElementById('total-count').innerText = data.totalDone;
                    document.getElementById('total-percent').innerText = "(" + data.totalPercent + "%)";
                    document.getElementById('latest-count').innerText = data.todayDone;
                    
                    // Автопарки
                    let pHtml = '';
                    data.parks.forEach(p => {
                        let pct = p.target > 0 ? ((p.done/p.target)*100).toFixed(1) : 0;
                        pHtml += `<div class="park-row">
                                    <span class="park-name">${p.name}</span>
                                    <span class="park-count-blue">${p.done} из ${p.target} (${pct}%)</span>
                                  </div>`;
                    });
                    document.getElementById('parks-container').innerHTML = pHtml;

                    // Күнделікті (Даты) - от новых к старым
                    let dHtml = '';
                    data.days.forEach(d => {
                        dHtml += `<div class="list-item">
                                    <span>${formatKazDate(d.date)}</span>
                                    <span class="list-val-blue">${d.count} автобус</span>
                                  </div>`;
                    });
                    document.getElementById('days-content').innerHTML = dHtml;

                    // Маршруттар (По возрастанию)
                    let rHtml = '';
                    data.routes.forEach(r => {
                        let rName = r.name === 'REZ' ? 'Резерв (REZ)' : r.name;
                        rHtml += `<div class="list-item">
                                    <span>Маршрут ${rName}</span>
                                    <span class="list-val-blue">${r.done}</span>
                                  </div>`;
                    });
                    document.getElementById('routes-content').innerHTML = rHtml;

                    // Кесте
                    let tHtml = '';
                    data.fullList.forEach(i => {
                        tHtml += `<tr><td>${i.park.length > 12 ? i.park.substring(0, 12) + '...' : i.park}</td><td>${i.route}</td><td style="font-weight:700; color:#0055ff;">${i.id}</td><td>${i.model.substring(0, 10)}</td></tr>`;
                    });
                    document.getElementById('table-content').innerHTML = tHtml;
                })
                .catch(err => {
                    document.getElementById('loading-indicator').style.display = 'none';
                    document.getElementById('dashboard-content').style.display = 'block';
                    document.getElementById('error-container').innerHTML = `<div class="error-message">Қосылу қатесі. Сервер жауап бермейді.</div>`;
                });
        }
    </script>
</body>
</html>
