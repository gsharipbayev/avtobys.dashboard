<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0055ff; --orange: #ff7a00; --bg: #f4f5f9; --card: #ffffff; --text: #1a1b22; --sub: #8e94a6; }
        body { margin: 0; padding: 15px; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .app-container { width: 100%; max-width: 400px; margin: 0 auto; display: none; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px 20px; border-radius: 32px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .pin-input { width: 80%; padding: 15px; font-size: 24px; font-weight: 800; text-align: center; letter-spacing: 10px; border: 2px solid #eee; border-radius: 16px; margin: 20px 0; outline: none; }
        .login-btn { width: 90%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-grid { display: flex; justify-content: space-between; }
        .stat-val { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
        .park-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8f9fa; font-size: 13px; font-weight: 600; }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 15px; }
        .modal.active { display: block; }
        .back-btn { background: var(--card); border: none; padding: 12px 20px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; color: var(--sub); padding: 10px; }
        td { padding: 10px; border-top: 1px solid #f8f9fa; font-weight: 600; }
        #loader { text-align: center; padding: 40px; color: var(--sub); font-weight: 600; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:var(--blue); margin:0;">Smart Mobility</h2>
            <p style="color:var(--sub); font-size:12px;">Алматы • Монтаж</p>
            <input type="password" id="pin" class="pin-input" placeholder="••••" inputmode="numeric">
            <button class="login-btn" onclick="auth()">Кіру</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <div id="loader">Жүктелуде...</div>
        <div id="content" style="display:none">
            <div class="card stat-grid">
                <div onclick="openM('all-modal')">
                    <div class="stat-val" style="color:var(--orange)" id="t-done">0</div>
                    <div style="font-size:12px; color:var(--sub)">Барлығы <span id="t-pct"></span></div>
                </div>
                <div style="text-align:right" onclick="openM('today-modal')">
                    <div class="stat-val" style="color:var(--blue)" id="t-today">0</div>
                    <div style="font-size:12px; color:var(--sub)">Бүгін жасалған</div>
                </div>
            </div>
            <div style="font-size:14px; font-weight:800; margin:15px 5px;">Автопарктер</div>
            <div class="card" id="p-list"></div>
            <div class="card" id="p-more" style="display:none"></div>
            <button id="p-btn" style="width:100%; background:none; border:none; color:var(--blue); font-weight:700; margin-bottom:20px;" onclick="showP()">Барлығы ↓</button>
            <div style="display:flex; gap:10px">
                <button class="login-btn" style="background:var(--card); color:#000; flex:1" onclick="openM('r-modal')">Маршруттар</button>
                <button class="login-btn" style="background:var(--card); color:#000; flex:1" onclick="openM('d-modal')">Күнделікті</button>
            </div>
        </div>
    </div>

    <div class="modal" id="all-modal"><button class="back-btn" onclick="closeM()">← Артқа</button><h3>Тізім</h3><div class="card" style="overflow-x:auto"><table><thead><tr><th>№</th><th>Гос</th><th>Борт</th><th>Марш</th><th>Бригада</th></tr></thead><tbody id="all-t"></tbody></table></div></div>
    <div class="modal" id="today-modal"><button class="back-btn" onclick="closeM()">← Артқа</button><h3>Бүгін</h3><div class="card" style="overflow-x:auto"><table><thead><tr><th>№</th><th>Гос</th><th>Борт</th><th>Марш</th><th>Бригада</th></tr></thead><tbody id="today-t"></tbody></table></div></div>
    <div class="modal" id="r-modal"><button class="back-btn" onclick="closeM()">← Артқа</button><h3>Маршруттар</h3><div id="r-list"></div></div>
    <div class="modal" id="d-modal"><button class="back-btn" onclick="closeM()">← Артқа</button><h3>Күнделікті</h3><div id="d-list"></div></div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbyIq_TzbUb7E4ebzdj3SSvtSDOHF8EyUu8UkCUdpictaqXPJ82-5Vxchg5fTp18Se1JDg/exec';
        function auth() { if(document.getElementById('pin').value === '2019') { document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block'; load(); } }
        function openM(id) { document.getElementById('app').style.display='none'; document.getElementById(id).classList.add('active'); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('app').style.display='block'; }
        function showP() { document.getElementById('p-more').style.display='block'; document.getElementById('p-btn').style.display='none'; }

        async function load() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                document.getElementById('loader').style.display='none';
                document.getElementById('content').style.display='block';
                document.getElementById('t-done').innerText = d.totalDone;
                document.getElementById('t-pct').innerText = `(${d.totalPercent}%)`;
                document.getElementById('t-today').innerText = d.todayDone;
                let p1 = '', p2 = '';
                d.parks.forEach((p, i) => { 
                    let h = `<div class="park-row"><span>${i+1}. ${p.name}</span><span style="color:var(--blue)">${p.done}/${p.target}</span></div>`;
                    if(i < 6) p1 += h; else p2 += h;
                });
                document.getElementById('p-list').innerHTML = p1;
                document.getElementById('p-more').innerHTML = p2;
                let aT = '', tT = '', iA = 1, iT = 1;
                d.fullList.forEach(b => {
                    let row = `<tr><td>${iA++}</td><td>${b.gosNum}</td><td>${b.garage}</td><td>${b.route}</td><td>${b.brigade}</td></tr>`;
                    aT += row;
                    if(b.isToday) tT += `<tr><td>${iT++}</td><td>${b.gosNum}</td><td>${b.garage}</td><td>${b.route}</td><td>${b.brigade}</td></tr>`;
                });
                document.getElementById('all-t').innerHTML = aT;
                document.getElementById('today-t').innerHTML = tT;
                document.getElementById('r-list').innerHTML = d.routes.map(r => `<div class="card" style="display:flex; justify-content:space-between"><b>${r.name}</b><span>${r.done}/${r.target} (${r.percent}%)</span></div>`).join('');
                document.getElementById('d-list').innerHTML = d.days.map(d => `<div class="card" style="display:flex; justify-content:space-between"><b>${d.date}</b><span>${d.count}</span></div>`).join('');
            } catch(e) { document.getElementById('loader').innerText = 'Ошибка'; }
        }
    </script>
</body>
</html>
