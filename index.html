<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 15px; font-family: 'Inter', sans-serif; background-color: #f4f6fb; color: #1a1b22; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; display: none; }
        
        /* Login */
        #login-screen { position: fixed; inset: 0; background: #f4f6fb; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #fff; padding: 40px; border-radius: 28px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .pin-input { width: 100%; padding: 15px; font-size: 32px; font-weight: 800; text-align: center; letter-spacing: 15px; border: 2px solid #edf1f7; border-radius: 16px; margin: 20px 0; outline: none; }
        .login-btn { width: 100%; background: #000; color: #fff; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; }

        /* Header */
        .logo-card { background: #fff; border-radius: 24px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .refresh-icon { position: absolute; right: 20px; cursor: pointer; opacity: 0.3; font-size: 20px; }
        .montazh-title { text-align: center; color: #a0a5b1; font-weight: 800; font-size: 13px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Stats Card */
        .card { background: #fff; border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .status-card { display: flex; justify-content: space-between; align-items: flex-end; }
        .status-number.orange { font-size: 42px; font-weight: 900; color: #ff7a00; line-height: 1; }
        .status-percent { font-size: 16px; font-weight: 700; color: #8e94a6; margin-left: 5px; }
        .status-number.blue { font-size: 42px; font-weight: 900; color: #0055ff; line-height: 1; }
        .status-label { color: #a0a5b1; font-size: 12px; font-weight: 700; margin-top: 8px; }

        /* Lists */
        .section-header { font-size: 19px; font-weight: 800; margin: 0 0 15px 5px; }
        .park-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f2f5; }
        .park-row:last-child { border: none; }
        .park-name { font-size: 14px; font-weight: 700; max-width: 60%; }
        .park-count-blue { font-size: 14px; font-weight: 800; color: #0055ff; }

        .filter-row { display: flex; gap: 12px; margin-bottom: 20px; }
        .filter-btn { flex: 1; background: #fff; border-radius: 18px; padding: 18px; font-size: 14px; font-weight: 800; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); cursor: pointer; }
        .action-button { width: 100%; background: #1a1b22; color: #fff; border: none; border-radius: 20px; padding: 20px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .secondary-btn { background: #f4f6fb; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 800; margin-top: 10px; cursor: pointer;}

        /* Modals */
        .modal { position: fixed; inset: 0; background: #f4f6fb; z-index: 1000; display: none; overflow-y: auto; padding: 15px; }
        .modal.active { display: block; }
        .back-btn { background: #fff; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; text-align: left; border: none; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .list-item { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.01); font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 20px; overflow: hidden; font-size: 12px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f2f5; }
        th { background: #fafafa; color: #a0a5b1; font-weight: 800; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="https://drive.google.com/uc?export=view&id=1N1ZIf84icjDJEFPY-X2VCKDhDbUWi4Uy" width="140">
            <div class="login-title">Құпия сөзді енгізіңіз</div>
            <input type="password" id="pin-input" class="pin-input" maxlength="4">
            <button class="login-btn" onclick="checkPin()">Кіру</button>
        </div>
    </div>

    <div class="app-container" id="main-view">
        <div class="logo-card">
            <img src="https://drive.google.com/uc?export=view&id=1N1ZIf84icjDJEFPY-X2VCKDhDbUWi4Uy" height="40">
            <div class="refresh-icon" onclick="loadData()">↻</div>
        </div>
        <div class="montazh-title">Монтаж мониторингі</div>

        <div id="dashboard-content">
            <div class="card status-card">
                <div>
                    <div class="status-number-group"><span class="status-number orange" id="total-count">0</span><span class="status-percent" id="total-percent"></span></div>
                    <div class="status-label">Барлық автобустар</div>
                </div>
                <div style="text-align:right">
                    <div class="status-number blue" id="latest-count">0</div>
                    <div class="status-label">Бүгін жасалған</div>
                </div>
            </div>

            <div class="section-header">Автопарктер статистикасы</div>
            <div class="card" id="parks-container"></div>

            <div class="filter-row">
                <div class="filter-btn" onclick="openModal('days-modal')">Күнделікті</div>
                <div class="filter-btn" onclick="openModal('routes-modal')">Маршруттар</div>
            </div>
            <button class="action-button" onclick="openModal('table-modal')">Толық тізімді көру</button>
        </div>
    </div>

    <div class="modal" id="parks-modal"><button class="back-btn" onclick="closeModals()">← Артқа қайту</button><div id="parks-full-content"></div></div>
    <div class="modal" id="days-modal"><button class="back-btn" onclick="closeModals()">← Артқа қайту</button><div id="days-content"></div></div>
    <div class="modal" id="routes-modal"><button class="back-btn" onclick="closeModals()">← Артқа қайту</button><div id="routes-content"></div></div>
    <div class="modal" id="table-modal"><button class="back-btn" onclick="closeModals()">← Артқа қайту</button><div style="overflow-x:auto"><table><thead><tr><th>Парк</th><th>Марш.</th><th>Гос №</th></tr></thead><tbody id="table-content"></tbody></table></div></div>

    <script>
        const GOOGLE_API_URL = 'ВСТАВЬТЕ_ВАШУ_НОВУЮ_ССЫЛКУ_ЗДЕСЬ';
        const PIN = '2019';
        const monthNames = ["қаңтар", "ақпан", "наурыз", "сәуір", "мамыр", "маусым", "шілде", "тамыз", "қыркүйек", "қазан", "қараша", "желтоқсан"];

        function formatKazDate(s) { let p=s.split('.'); return p[0]+' '+monthNames[parseInt(p[1])-1]; }
        function checkPin() { if(document.getElementById('pin-input').value===PIN){document.getElementById('login-screen').style.display='none';document.getElementById('main-view').style.display='block';loadData();} }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active')); }

        function loadData() {
            fetch(GOOGLE_API_URL).then(r => r.json()).then(data => {
                document.getElementById('total-count').innerText = data.totalDone;
                document.getElementById('total-percent').innerText = "(" + data.totalPercent + "%)";
                document.getElementById('latest-count').innerText = data.todayDone;

                let activeParks = data.parks.filter(p => p.done > 0);
                let pHtml = '';
                activeParks.slice(0, 5).forEach((p, i) => {
                    let pct = p.target > 0 ? ((p.done/p.target)*100).toFixed(1) : 0;
                    pHtml += `<div class="park-row"><span class="park-name">${i+1}. ${p.name}</span><span class="park-count-blue">${p.done} из ${p.target} (${pct}%)</span></div>`;
                });
                if(activeParks.length > 5) pHtml += `<button class="secondary-btn" onclick="openModal('parks-modal')">Барлығын көру</button>`;
                document.getElementById('parks-container').innerHTML = pHtml;

                let fullPHtml = '';
                activeParks.forEach((p, i) => {
                    let pct = p.target > 0 ? ((p.done/p.target)*100).toFixed(1) : 0;
                    fullPHtml += `<div class="list-item"><span>${i+1}. ${p.name}</span><span class="park-count-blue">${p.done}/${p.target} (${pct}%)</span></div>`;
                });
                document.getElementById('parks-full-content').innerHTML = fullPHtml;

                document.getElementById('days-content').innerHTML = data.days.map(d => `<div class="list-item"><span>${formatKazDate(d.date)}</span><span class="status-number blue" style="font-size:20px">${d.count}</span></div>`).join('');
                document.getElementById('routes-content').innerHTML = data.routes.map(r => `<div class="list-item"><span>${r.name==='REZ'?'Резерв':('Маршрут '+r.name)}</span><span class="park-count-blue">${r.done}</span></div>`).join('');
                document.getElementById('table-content').innerHTML = data.fullList.map(i => `<tr><td>${i.park.substring(0,12)}...</td><td>${i.route}</td><td style="font-weight:800;color:#0055ff">${i.id}</td></tr>`).join('');
            });
        }
    </script>
</body>
</html>
